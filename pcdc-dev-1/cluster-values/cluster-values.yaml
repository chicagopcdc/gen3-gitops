cluster: pcdc-dev-1
project: pcdc-dev-1

accountNumber: "009732147623"

configuration:
  configurationRepo: https://github.com/chicagopcdc/gen3-gitops
  configurationRevision: master

alb-controller:
  enabled: true
  configuration:
    enabled: false

aws-s3-mountpoint:
  enabled: true
  configuration:
    enabled: false

calico:
  enabled: false
  configuration:
    enabled: false

coreDNS:
  enabled: true
  configuration:
    enabled: true

cilium:
  enabled: true

ebs-csi-driver:
  enabled: true
  configuration:
    enabled: false

fluentd:
  enabled: false
  configuration:
    enabled: false

kube-state-metrics:
  enabled: false
  configuration:
    enabled: false

grafana-alloy:
  enabled: false
  configuration:
    enabled: false

karpenter:
  enabled: true
  targetRevision: "1.8.6"
  configuration:
    enabled: false

karpenter-crds:
  amiSelectorName: "EKS-1-35-x86-x64-AL23*"
  enabled: true
  selectorTag: pcdc-dev-1
  migration: true
  default:
    disruptionBudget: "80%"
    nodeClassRef:
      apiVersion: karpenter.k8s.aws/v1
      kind: EC2NodeClass
      name: default
    amiFamily: AL2023
    limits:
      memory: 400Gi
    consolidationPolicy: "WhenEmptyOrUnderutilized"
    consolidateAfter: "1m"
    expireAfter: "72h"
    volumeSize: 50Gi
    requirements:
      - key: karpenter.sh/capacity-type
        operator: In
        values:
          - spot
      - key: kubernetes.io/arch
        operator: In
        values:
          - amd64
      - key: karpenter.k8s.aws/instance-memory
        operator: Gt
        values:
          - "4000"
      - key: karpenter.k8s.aws/instance-memory
        operator: Lt
        values:
          - "9000"

  jupyter:
    enabled: false
  workflow:
    enabled: false

vpc-cni:
  enabled: true
  configuration:
    enabled: false
kube-proxy:
  enabled: true
