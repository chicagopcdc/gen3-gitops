global:
  aws:
    enabled: true
    account: "677809101101"
    hatchery_role: "arn:aws:iam::677809101101:role/gen3-service/gen3-luca-play-default-hatchery-sa"
    secretStoreServiceAccount:
      enabled: true
      name: external-secrets
      roleArn: "arn:aws:iam::677809101101:role/gen3_service/gen3-luca-play-default-external-secrets-sa"
    wafv2:
      enabled: true
      wafAclArn: ""
  dev: false
  externalSecrets:
    deploy: true
  postgres:
    dbCreate: true
    externalSecret: "gen3-luca-play-aurora-master-password"
  environment: "gen3-luca-play"
  hostname: "portal-luca.pedscommons.org"
  revproxyArn: "arn:aws:acm:us-east-1:677809101101:certificate/63c2486a-28b5-487b-90d9-d48f224b17c1"
  dictionaryUrl: "https://pcdc-staging-dictionaries.s3.amazonaws.com/pcdc-schema-staging-20250114.json"
  portalApp: pcdc
  publicDataSets: false
  tierAccessLevel: "granular"
  tierAccessLimit: "5"
  netPolicy:
