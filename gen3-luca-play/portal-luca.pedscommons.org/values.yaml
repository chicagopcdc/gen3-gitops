ambassador:
  enabled: false

arborist:
  enabled: true
  externalSecrets:
    dbcreds: "gen3-luca-play-default-arborist-creds"
#     -  image:
# -    repository: quay.io/pcdc/arborist
# -    tag: "2026.03"


argo-wrapper:
  enabled: false

audit:
  enabled: false
  serviceAccount:
    annotations: 
      eks.amazonaws.com/role-arn: "arn:aws:iam::677809101101:role/gen3_service/gen3-luca-play-default-audit-sa"
  externalSecrets:
    dbcreds: "gen3-luca-play-default-audit-creds"
    createK8sAuditSecret: true


aws-es-proxy:
  enabled: true
  esEndpoint: "vpc-gen3-luca-play-gen3-metadata-hfduu2vqkjnftxjarhyx4uon5a.us-east-1.es.amazonaws.com"
  externalSecrets:
    awsCreds: "gen3-luca-play-default-aws-es-proxy-creds"
#   -  image:
# -    repository: "quay.io/cdis/aws-es-proxy"
# -    tag: "v1.3.1"
# -    pullPolicy: "IfNotPresent"

dicom-server:
  enabled: false
  externalSecrets:
    dbcreds: "gen3-luca-play-default-dicom-server-creds"

dicom-viewer:
  enabled: false
  externalSecrets:
    dbcreds: "gen3-luca-play-default-dicom-viewer-creds"


fence:
# -  amanuensis:
# -    enabled: true
  enabled: true
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::677809101101:role/gen3_service/gen3-luca-play-default-fence-sa"

  externalSecrets:
    fenceJwtKeys: "gen3-luca-play-default-fence-jwt-keys"
    fenceConfig: "gen3-luca-play-default-fence-config"
    fenceGoogleAppCredsSecret: ""
    fenceGoogleStorageCredsSecret: ""
    createK8sGoogleAppSecrets: true
    dbcreds: "gen3-luca-play-default-fence-creds"

  usersync:
    usersync: true
    schedule: "*/30 * * * *"
    syncFromDbgap: false
    userYamlS3Path: "s3://gen3-luca-play-users/dev/user.yaml"
    slack_webhook: ""
    slack_send_dbgap: false

frontend-framework:
  enabled: false
  image:
    repository: "quay.io/cdis/frontend-framework"
    tag: "main"

grafana:
  enabled: false

guppy:
  enabled: false

hatchery:
  enabled: true

  hatchery:
    sidecarContainer:
      cpu-limit: '0.1'
      memory-limit: 256Mi
      image: quay.io/cdis/ecs-ws-sidecar:master
      env:
        NAMESPACE: "{{ .Release.Namespace }}"
        HOSTNAME: "{{ .Values.global.hostname }}"
      args: []
      command:
      - "/bin/bash"
      - "./sidecar.sh"
      lifecycle-pre-stop:
      - su
      - "-c"
      - echo test
      - "-s"
      - "/bin/sh"
      - root
    containers:
      -
        target-port: 8888
        cpu-limit: '1.0'
        memory-limit: 2Gi
        name: "(Tutorials) Example Analysis Jupyter Lab Notebooks"
        image: quay.io/cdis/heal-notebooks:combined_tutorials__latest
        env:
          FRAME_ANCESTORS: https://{{ .Values.global.hostname }}
        args:
        - "--NotebookApp.base_url=/lw-workspace/proxy/"
        - "--NotebookApp.default_url=/lab"
        - "--NotebookApp.password=''" #pragma: allowlist secret
        - "--NotebookApp.token=''"
        - "--NotebookApp.shutdown_no_activity_timeout=5400"
        - "--NotebookApp.quit_button=False"
        command:
        - start-notebook.sh
        path-rewrite: "/lw-workspace/proxy/"
        use-tls: 'false'
        ready-probe: "/lw-workspace/proxy/"
        lifecycle-post-start:
        - "/bin/sh"
        - "-c"
        - export IAM=`whoami`; rm -rf /home/$IAM/pd/dockerHome; rm -rf /home/$IAM/pd/lost+found;
          ln -s /data /home/$IAM/pd/; true
        user-uid: 1000
        fs-gid: 100
        user-volume-location: "/home/jovyan/pd"
        gen3-volume-location: "/home/jovyan/.gen3"


indexd:
  enabled: true
  defaultPrefix: "dg.XXXX/"
  externalSecrets:
    dbcreds: "gen3-luca-play-default-indexd-creds"
    createK8sServiceCredsSecret: true


manifestservice:
  enabled: true
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::677809101101:role/gen3_service/gen3-luca-play-default-manifestservice-sa"
  externalSecrets:
    createK8sManifestServiceSecret: true

metadata:
  enabled: true
  externalSecrets:
    dbcreds: "gen3-luca-play-default-metadata-creds"
    createK8sMetadataSecret: true

peregrine:
  enabled: true
  externalSecrets:
    dbcreds: "gen3-luca-play-default-sheepdog-creds"

pidgin:
  enabled: false

portal:
  enabled: true

requestor:
  enabled: false
  externalSecrets:
    dbcreds: "gen3-luca-play-default-requestor-creds"

revproxy:
  enabled: true

sheepdog:
  enabled: true
  externalSecrets:
    dbcreds: "gen3-luca-play-default-sheepdog-creds"

ssjdispatcher:
  enabled: false

sower:
  enabled: false

wts:
  enabled: true
  externalSecrets:
    dbcreds: "gen3-luca-play-default-wts-creds"
    createK8sWtsSecret: true
